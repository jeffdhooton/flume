name: release

# Triggered on tag push (v1.2.3, v1.2.3-rc1, etc). Builds the flume binary
# for darwin+linux × amd64+arm64, uploads archives to a GitHub draft
# release. Publish the draft manually after eyeballing the changelog.
#
# To cut a release:
#   git tag v0.1.0
#   git push origin v0.1.0

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify build and tests pass before releasing
        run: |
          go build ./...
          go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
